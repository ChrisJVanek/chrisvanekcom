# Run Cronometer export + merge daily. Data is written to PostgreSQL when
# DATABASE_URL secret is set; the site reads from the same DB on /health.
# Site timezone is GMT+10. 00:00 UTC and 14:00 UTC (= midnight GMT+10).
# Add repo secrets: CRONOMETER_EMAIL, CRONOMETER_PASSWORD, DATABASE_URL.
name: Cronometer sync

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run Cronometer sync (writes to DB)
        env:
          CRONOMETER_EMAIL: ${{ secrets.CRONOMETER_EMAIL }}
          CRONOMETER_PASSWORD: ${{ secrets.CRONOMETER_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run cronometer:sync
