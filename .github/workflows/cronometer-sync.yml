# Run Cronometer export + merge. Data is written to PostgreSQL when
# DATABASE_URL secret is set; the site reads from the same DB on /health.
# Sync runs every 6h so today's food can appear same day. Export uses
# "Last 14/30 days" so the current day is included.
# Add repo secrets: CRONOMETER_EMAIL, CRONOMETER_PASSWORD, DATABASE_URL.
name: Cronometer sync

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "::error::DATABASE_URL secret is not set. Add it in repo Settings → Secrets and variables → Actions so the sync writes to your database."
            exit 1
          fi

      - name: Install Playwright Chromium and system deps
        run: |
          npx playwright install-deps chromium
          npx playwright install chromium

      - name: Run Cronometer sync (writes to DB)
        env:
          CRONOMETER_EMAIL: ${{ secrets.CRONOMETER_EMAIL }}
          CRONOMETER_PASSWORD: ${{ secrets.CRONOMETER_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run cronometer:sync
