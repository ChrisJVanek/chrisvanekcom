# Run Cronometer export + merge at midnight UTC every day.
# Add repo secrets: CRONOMETER_EMAIL, CRONOMETER_PASSWORD.
name: Cronometer sync

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run Cronometer sync
        env:
          CRONOMETER_EMAIL: ${{ secrets.CRONOMETER_EMAIL }}
          CRONOMETER_PASSWORD: ${{ secrets.CRONOMETER_PASSWORD }}
        run: npm run cronometer:sync

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/cronometer/
          git diff --staged --quiet || (git commit -m "chore: cronometer sync" && git push)
